/* ─────────────────────────────────────────
   UNIFIED DESIGN SYSTEM
   Matches Community Topics Bento as reference
───────────────────────────────────────── */
.gs-root {

  font-size: 14px;

  color: #0a0a0a;

  -webkit-font-smoothing: antialiased;
  box-sizing: border-box;
}
.gs-root * { box-sizing: border-box; }

/* Wrapper */
.gs-wrap { max-width: 1140px; margin: 0 auto; padding: 24px 20px; }
.gs-wrap--sidebar { padding: 20px 16px; } /* no max-width — sidebar fills column */

/* ── Header (every widget) ── */
.gs-header { margin-bottom: 16px; }
.gs-header-row { display: flex; align-items: center; justify-content: space-between; }
.gs-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #a1a1aa;
}
.gs-heading {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: #0a0a0a;

}
.gs-sub {
  font-size: 13px;
  color: #71717a;
  margin: 0;
}
.gs-link {
  font-size: 12px;
  font-weight: 500;
  color: #7c3aed;
  text-decoration: none;
  white-space: nowrap;
}
.gs-link:hover { text-decoration: underline; }

/* ── Tabs ── */
.gs-tabs {
  display: flex;
  gap: 2px;
  background: #f4f4f5;
  border-radius: 8px;
  padding: 3px;
}
.gs-tab {
  border: none;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: #71717a;
  font-family: inherit;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.gs-tab.active {
  background: #ffffff;
  color: #0a0a0a;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.gs-tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  border-radius: 999px;
  background: #7c3aed;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 0 4px;
}

/* ── Buttons ── */
.gs-btn-icon {
  width: 30px; height: 30px;
  border: 1px solid #e4e4e7;
  border-radius: 6px;
  background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: #3f3f46;
  transition: border-color .15s, background .15s, color .15s;
}
.gs-btn-icon:hover { border-color: #c4b5fd; background: #f5f3ff; color: #7c3aed; }
.gs-btn-icon:disabled { opacity: .3; cursor: default; pointer-events: none; }

.gs-btn-primary {
  display: inline-flex; align-items: center; gap: 5px;
  background: #7c3aed; color: #ffffff;
  border: none; border-radius: 6px;
  padding: 8px 16px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.gs-btn-primary:hover { background: #6d28d9; }

/* ── Dots (carousel) ── */
.gs-dots { display: flex; gap: 5px; align-items: center; }
.gs-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #e4e4e7;
  cursor: pointer;
  transition: background .2s, transform .2s;
}
.gs-dot.active { background: #7c3aed; transform: scale(1.3); }

/* ── Row / card hover ── */
.gs-hover:hover { background: #faf5ff; }

/* ── Stats ── */
.gs-stats { display: flex; align-items: center; gap: 10px; }
.gs-stat {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; color: #a1a1aa; white-space: nowrap;
}
.gs-stat svg { width: 11px; height: 11px; }

/* ── Like ── */
.gs-like {
  display: inline-flex; align-items: center; gap: 4px;
  border: none; background: transparent;
  font-size: 11px; font-weight: 500; color: #a1a1aa;
  font-family: inherit; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: color .15s, background .15s;
  user-select: none;
}
.gs-like svg { width: 12px; height: 12px; transition: fill .15s, stroke .15s; }
.gs-like:hover { color: #ef4444; background: #fef2f2; }
.gs-like:hover svg { stroke: #ef4444; }
.gs-like.on { color: #ef4444; }
.gs-like.on svg { fill: #ef4444; stroke: #ef4444; }

/* ── Badge ── */
.gs-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  white-space: nowrap;
}
.gs-badge--purple { background: #f5f3ff; color: #7c3aed; border: 1px solid #ede9fe; }
.gs-badge--green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.gs-badge--amber  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
.gs-badge--red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.gs-badge--muted  { background: #f4f4f5; color: #71717a; border: 1px solid #e4e4e7; }

/* ── Divider ── */
.gs-divider { height: 1px; background: #f4f4f5; margin: 0; }
.gs-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; margin-top: 10px;
  border-top: 1px solid #f4f4f5;
}

/* ── Progress ── */
.gs-progress-track { height: 5px; background: #e4e4e7; border-radius: 999px; overflow: hidden; }
.gs-progress-fill  { height: 100%; background: #7c3aed; border-radius: 999px; transition: width .8s ease; }

/* ── Input ── */
.gs-input {
  width: 100%; height: 40px;
  border: 1px solid #e4e4e7; border-radius: 8px;
  padding: 0 12px 0 36px;
  font-size: 13px; font-family: inherit;
  color: #0a0a0a; background: #ffffff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.gs-input::placeholder { color: #a1a1aa; }
.gs-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }

.mp { display:block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fff; padding:24px 20px; -webkit-font-smoothing:antialiased; }

.mp-meta { font-size:11px; color:#a1a1aa; }

/* Single row layout */
.mp-row { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:start; }

/* Options: horizontal pill row */
.mp-options { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.mp-opt {
  display:flex; align-items:center; gap:7px;
  border:1.5px solid #e4e4e7; border-radius:999px;
  padding:8px 14px; cursor:pointer;
  font-size:13px; font-weight:500; color:#3f3f46;
  background:#fff;
  transition:border-color .15s, background .15s, transform .1s;
  position:relative; overflow:hidden;
  flex-shrink:0;
}
.mp-opt:hover { border-color:#c4b5fd; background:#faf5ff; transform:scale(1.02); }
.mp-opt.selected { border-color:#7c3aed; background:#f5f3ff; color:#7c3aed; }
.mp-opt.voted { cursor:default; }
.mp-opt.voted:hover { transform:none; }
.mp-opt-emoji { font-size:16px; }
.mp-opt-label { white-space:nowrap; }
.mp-opt-pct { font-size:12px; font-weight:700; color:#7c3aed; display:none; margin-left:2px; }
.mp-opt.voted .mp-opt-pct { display:inline; }

/* fill bar behind pill */
.mp-opt-fill { position:absolute; left:0; top:0; bottom:0; background:rgba(124,58,237,.07); border-radius:999px; width:0; transition:width .8s cubic-bezier(.4,0,.2,1) .1s; z-index:0; }
.mp-opt > *:not(.mp-opt-fill) { position:relative; z-index:1; }

.mp-footer { display:flex; align-items:center; gap:10px; }
.mp-count { font-size:11px; color:#a1a1aa; }
.mp-submit {
  height:32px; padding:0 16px;
  background:#7c3aed; color:#fff;
  border:none; border-radius:6px;
  font-size:12px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:background .15s;
  white-space:nowrap;
}
.mp-submit:hover { background:#6d28d9; }
.mp-submit:disabled { background:#e4e4e7; color:#a1a1aa; cursor:default; }

/* Right: mini trend chart */
.mp-chart-wrap { flex-shrink:0; width:220px; }
.mp-chart-label { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#a1a1aa; margin-bottom:8px; }
.mp-chart { display:flex; align-items:flex-end; gap:4px; height:56px; }
.mp-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.mp-bar-seg { width:100%; border-radius:3px 3px 0 0; }
.mp-bar-day { font-size:9px; color:#a1a1aa; }

.mp-vibe { margin-top:10px; display:flex; align-items:center; gap:8px; padding:10px 12px; background:#f9f9fb; border-radius:8px; }
.mp-vibe-emoji { font-size:20px; }
.mp-vibe-text { font-size:12px; font-weight:600; color:#18181b; }
.mp-vibe-sub { font-size:11px; color:#71717a; }

/* ── Consistent widget header ── */
.gs-header { margin-bottom: 16px; }
.gs-header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 3px; }
.gs-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--gs-subtle, #a1a1aa); margin: 0; }
.gs-subtitle { font-size: 13px; color: var(--gs-muted, #71717a); margin: 0; }
.gs-link { font-size: 12px; font-weight: 500; color: var(--gs-accent, #7c3aed); text-decoration: none; }
.gs-link:hover { text-decoration: underline; }

</style>

<script>
(function() {
  var ROOT = document.currentScript ? document.currentScript.closest('section') : document;
  if (!ROOT) ROOT = document;

  ROOT.querySelectorAll('[data-action="vote"]').forEach(function(el) {
    el.addEventListener('click', function() { mpVote(el); });
  });
  var sub = ROOT.querySelector('[data-action="submit"]');
  if (sub) sub.addEventListener('click', function() { mpSubmit(); });

var mpSelected = null;
function mpVote(el) {
  if (ROOT.querySelector('.mp-opt.voted')) return;
  ROOT.querySelectorAll('.mp-opt').forEach(function(o){ o.classList.remove('selected'); });
  el.classList.add('selected'); mpSelected = el;
  ROOT.querySelector('#mpBtn').disabled = false;
  ROOT.querySelector('#mpCount').textContent = 'Ready to submit your vote';
}
function mpSubmit() {
  if (!mpSelected) return;
  ROOT.querySelectorAll('.mp-opt').forEach(function(o){
    o.classList.add('voted'); o.onclick = null;
    o.querySelector('.mp-opt-fill').style.width = o.getAttribute('data-val') + '%';
  });
  ROOT.querySelector('#mpBtn').textContent = '✓ Voted!';
  ROOT.querySelector('#mpBtn').disabled = true;
  ROOT.querySelector('#mpCount').textContent = '848 responses this week';
}
