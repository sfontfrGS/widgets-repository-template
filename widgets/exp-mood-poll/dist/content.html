<section class="mp">
<style>
.mp { display:block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fff; padding:24px 20px; -webkit-font-smoothing:antialiased; }
.mp * { box-sizing:border-box; }
.mp-wrap { max-width:1140px; margin:0 auto; }

.mp-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
.mp-header h2 { font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#71717a; margin:0; }
.mp-meta { font-size:11px; color:#a1a1aa; }

/* Single row layout */
.mp-row { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:start; }

/* Options: horizontal pill row */
.mp-options { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.mp-opt {
  display:flex; align-items:center; gap:7px;
  border:1.5px solid #e4e4e7; border-radius:999px;
  padding:8px 14px; cursor:pointer;
  font-size:13px; font-weight:500; color:#3f3f46;
  background:#fff;
  transition:border-color .15s, background .15s, transform .1s;
  position:relative; overflow:hidden;
  flex-shrink:0;
}
.mp-opt:hover { border-color:#c4b5fd; background:#faf5ff; transform:scale(1.02); }
.mp-opt.selected { border-color:#7c3aed; background:#f5f3ff; color:#7c3aed; }
.mp-opt.voted { cursor:default; }
.mp-opt.voted:hover { transform:none; }
.mp-opt-emoji { font-size:16px; }
.mp-opt-label { white-space:nowrap; }
.mp-opt-pct { font-size:12px; font-weight:700; color:#7c3aed; display:none; margin-left:2px; }
.mp-opt.voted .mp-opt-pct { display:inline; }

/* fill bar behind pill */
.mp-opt-fill { position:absolute; left:0; top:0; bottom:0; background:rgba(124,58,237,.07); border-radius:999px; width:0; transition:width .8s cubic-bezier(.4,0,.2,1) .1s; z-index:0; }
.mp-opt > *:not(.mp-opt-fill) { position:relative; z-index:1; }

.mp-footer { display:flex; align-items:center; gap:10px; }
.mp-count { font-size:11px; color:#a1a1aa; }
.mp-submit {
  height:32px; padding:0 16px;
  background:#7c3aed; color:#fff;
  border:none; border-radius:6px;
  font-size:12px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:background .15s;
  white-space:nowrap;
}
.mp-submit:hover { background:#6d28d9; }
.mp-submit:disabled { background:#e4e4e7; color:#a1a1aa; cursor:default; }

/* Right: mini trend chart */
.mp-chart-wrap { flex-shrink:0; width:220px; }
.mp-chart-label { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#a1a1aa; margin-bottom:8px; }
.mp-chart { display:flex; align-items:flex-end; gap:4px; height:56px; }
.mp-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.mp-bar-seg { width:100%; border-radius:3px 3px 0 0; }
.mp-bar-day { font-size:9px; color:#a1a1aa; }

.mp-vibe { margin-top:10px; display:flex; align-items:center; gap:8px; padding:10px 12px; background:#f9f9fb; border-radius:8px; }
.mp-vibe-emoji { font-size:20px; }
.mp-vibe-text { font-size:12px; font-weight:600; color:#18181b; }
.mp-vibe-sub { font-size:11px; color:#71717a; }
</style>

<div class="mp-wrap">
  <div class="mp-header">
    <h2>😊 Community Mood</h2>
    <span class="mp-meta">Resets every Monday · 847 responses this week</span>
  </div>

  <div class="mp-row">

        <div class="mp-opt" data-val="60" onclick="mpVote(this)"><div class="mp-opt-fill"></div><span class="mp-opt-emoji">🚀</span><span class="mp-opt-label">Crushing it</span><span class="mp-opt-pct">60%</span></div>
        <div class="mp-opt" data-val="22" onclick="mpVote(this)"><div class="mp-opt-fill"></div><span class="mp-opt-emoji">😊</span><span class="mp-opt-label">Solid week</span><span class="mp-opt-pct">22%</span></div>
        <div class="mp-opt" data-val="12" onclick="mpVote(this)"><div class="mp-opt-fill"></div><span class="mp-opt-emoji">😐</span><span class="mp-opt-label">Mixed feelings</span><span class="mp-opt-pct">12%</span></div>
        <div class="mp-opt" data-val="6"  onclick="mpVote(this)"><div class="mp-opt-fill"></div><span class="mp-opt-emoji">😓</span><span class="mp-opt-label">Tough week</span><span class="mp-opt-pct">6%</span></div>
      </div>
      <div class="mp-footer">

    <div class="mp-chart-wrap">

    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:26px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:12px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:7px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">M</div></div>
    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:28px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:12px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:6px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">T</div></div>
    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:25px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:13px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:6px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">W</div></div>
    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:29px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:11px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:6px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">T</div></div>
    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:30px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:10px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:5px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">F</div></div>

    <div class="mp-bar-col"><div class="mp-bar-seg" style="background:#7c3aed;height:29px"></div><div class="mp-bar-seg" style="background:#0ea5e9;height:11px"></div><div class="mp-bar-seg" style="background:#f59e0b;height:6px"></div><div class="mp-bar-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-bar-day">S</div></div>
  </div>
      <div class="mp-vibe">
        <span class="mp-vibe-emoji">🚀</span>
        <div><div class="mp-vibe-text">High energy</div><div class="mp-vibe-sub">60% crushing it this week</div></div>
      </div>
    </div>
  </div>
</div>
</section>

<script>
var mpSelected = null;
function mpVote(el) {
  if (document.querySelector('.mp-opt.voted')) return;
  document.querySelectorAll('.mp-opt').forEach(function(o){ o.classList.remove('selected'); });
  el.classList.add('selected'); mpSelected = el;
  document.getElementById('mpBtn').disabled = false;
  document.getElementById('mpCount').textContent = 'Ready to submit your vote';
}
function mpSubmit() {
  if (!mpSelected) return;
  document.querySelectorAll('.mp-opt').forEach(function(o){
    o.classList.add('voted'); o.onclick = null;
    o.querySelector('.mp-opt-fill').style.width = o.getAttribute('data-val') + '%';
  });
  document.getElementById('mpBtn').textContent = '✓ Voted!';
  document.getElementById('mpBtn').disabled = true;
  document.getElementById('mpCount').textContent = '848 responses this week';
}

</script>
