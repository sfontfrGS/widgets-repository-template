<section id="w-moodpoll" class="g-root">
<style>
/* ═══════════════════════════════════════════════
   GAINSIGHT COMMUNITY — SHARED DESIGN SYSTEM
   Single source of truth for all widgets.
   Token prefix: --g-  |  Class prefix: g-
═══════════════════════════════════════════════ */

/* ─ Reset ─ */
.g { all:unset; display:block; }
.g *, .g *::before, .g *::after { box-sizing:border-box; margin:0; padding:0; }
a.g, button.g { cursor:pointer; }

/* ─ Base ─ */
.g-root {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: #111;

  -webkit-font-smoothing: antialiased;
}

/* ─ Layout ─ */
.g-wrap  { max-width: 1140px; margin: 0 auto; padding: 24px 20px; }

/* ─ Typography scale ─ */
/* Widget label (header of every widget — identical everywhere) */
.g-widget-label {

  letter-spacing: .08em;
  text-transform: uppercase;
  color: #a1a1aa;
  line-height: 1;
}
/* Section sub-label */
.g-sub-label {
  font-size: 11px;

}
/* Body text */
.g-body   { font-size: 14px; color: #111; }
.g-body-s { font-size: 13px; color: #111; }

.g-subtle { font-size: 11px; color: #a1a1aa; }
/* Big numbers */
.g-num-xl { font-size: 44px; font-weight: 800; letter-spacing: -.04em; line-height: 1; color: #111; }
.g-num-lg { font-size: 28px; font-weight: 800; letter-spacing: -.03em; line-height: 1; color: #111; }
.g-num-md { font-size: 20px; font-weight: 700; letter-spacing: -.02em; line-height: 1; color: #111; }
/* Card title */
.g-card-title   { font-size: 14px; font-weight: 600; color: #111; line-height: 1.38; }

/* ─ Colors ─ */
.g-accent       { color: #7c3aed; }
.g-accent-bg    { background: #f5f3ff; }
.g-accent-bd    { border-color: #ede9fe; }
.g-hover:hover  { background: #faf5ff !important; }

/* ─ Widget header (used in every widget) ─ */
.g-header {
  display: flex;

  margin-bottom: 16px;
}
.g-header-left  { display: flex; flex-direction: column; gap: 2px; }
.g-header-right { display: flex; align-items: center; gap: 6px; }

/* ─ Link ─ */
.g-link { font-size: 12px; font-weight: 500; color: #7c3aed; text-decoration: none; white-space: nowrap; }

/* ─ Tabs ─ */
.g-tabs { display: flex; gap: 2px; background: #f4f4f5; border-radius: 8px; padding: 3px; }

}
.g-tab.on { background: #fff; color: #111; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.g-tab-n  {
  min-width: 16px; height: 16px; border-radius: 999px;
  background: #7c3aed; color: #fff;
  font-size: 9px; font-weight: 700; padding: 0 4px;
  display: inline-flex; align-items: center; justify-content: center;
}

/* ─ Buttons ─ */
.g-btn {
  width: 30px; height: 30px;
  border: 1px solid #e4e4e7; border-radius: 6px;
  background: #fff; display: flex; align-items: center; justify-content: center;

}
.g-btn:hover  { border-color: #c4b5fd; background: #f5f3ff; color: #7c3aed; }

.g-btn-primary {
  display: inline-flex; align-items: center; gap: 5px;

  border: none; border-radius: 6px;
  padding: 8px 16px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.g-btn-primary:hover { background: #6d28d9; }

/* ─ Dots ─ */
.g-dots { display: flex; gap: 5px; align-items: center; }
.g-dot  { width: 6px; height: 6px; border-radius: 50%; background: #e4e4e7; cursor: pointer; transition: background .2s, transform .2s; }
.g-dot.on { background: #7c3aed; transform: scale(1.3); }

/* ─ Badges ─ */
.g-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap; border: 1px solid transparent;
}
.g-badge-p { background: #f5f3ff; color: #7c3aed; border-color: #ede9fe; }
.g-badge-g { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
.g-badge-a { background: #fffbeb; color: #b45309; border-color: #fde68a; }
.g-badge-r { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
.g-badge-m { background: #f4f4f5; color: #71717a; border-color: #e4e4e7; }

/* ─ Stats row ─ */
.g-stats { display: flex; align-items: center; gap: 10px; }
.g-stat  { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #a1a1aa; }
.g-stat svg { width: 11px; height: 11px; flex-shrink: 0; }

/* ─ Like button ─ */
.g-like {
  display: inline-flex; align-items: center; gap: 4px;
  border: none; background: transparent;
  font-size: 11px; font-weight: 500; color: #a1a1aa;
  font-family: inherit; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: color .15s, background .15s; user-select: none;
}
.g-like svg { width: 12px; height: 12px; transition: fill .15s, stroke .15s; }
.g-like:hover    { color: #ef4444; background: #fef2f2; }
.g-like:hover svg { stroke: #ef4444; }
.g-like.on       { color: #ef4444; }
.g-like.on svg   { fill: #ef4444; stroke: #ef4444; }

/* ─ Card ─ */
.g-card {
  border: 1px solid #e4e4e7; border-radius: 10px;
  background: #fff; transition: border-color .15s, box-shadow .15s;
}
.g-card:hover { border-color: #c4b5fd; box-shadow: 0 4px 16px rgba(124,58,237,.06); }
.g-card-p { padding: 16px 18px; }

/* ─ Row (list item) ─ */
.g-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid #f4f4f5;
  text-decoration: none; color: inherit;
  transition: background .12s; border-radius: 4px; cursor: pointer;
}
.g-row:last-child { border-bottom: none; }
.g-row:hover { background: #faf5ff; padding-left: 6px; padding-right: 6px; margin: 0 -6px; }

/* ─ Footer strip (stats + like) ─ */
.g-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; margin-top: 10px;
  border-top: 1px solid #f4f4f5;
}

/* ─ Divider ─ */
.g-divider { height: 1px; background: #f4f4f5; }

/* ─ Progress ─ */
.g-prog-track { height: 5px; background: #e4e4e7; border-radius: 999px; overflow: hidden; }
.g-prog-fill  { height: 100%; background: #7c3aed; border-radius: 999px; transition: width .8s ease; }

/* ─ Input ─ */
.g-input-wrap { position: relative; }
.g-input-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: #a1a1aa; pointer-events: none; }
.g-input {
  width: 100%; height: 40px;
  border: 1px solid #e4e4e7; border-radius: 8px;
  padding: 0 12px 0 34px;
  font-size: 13px; font-family: inherit; color: #111;
  background: #fff; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.g-input::placeholder { color: #a1a1aa; }
.g-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }

/* ─ Avatar ─ */
.g-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #0ea5e9);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.g-avatar-sm { width: 24px; height: 24px; font-size: 9px; }

/* ─ Icon tile ─ */
.g-icon-tile {
  width: 32px; height: 32px; border-radius: 8px;
  background: #f4f4f5; display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; transition: background .15s;
}

/* ─ Live dot ─ */
.g-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e; flex-shrink: 0;
  animation: gLiveDot 2s ease-in-out infinite;
}
@keyframes gLiveDot { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.65);} }

/* ─ Chip (search suggestion) ─ */
.g-chip {
  display: inline-flex; align-items: center;
  border: 1px solid #e4e4e7; border-radius: 999px;
  padding: 4px 12px; font-size: 12px; font-weight: 500;
  color: #52525b; background: #fff; cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  font-family: inherit;
}
.g-chip:hover { border-color: #c4b5fd; background: #f5f3ff; color: #7c3aed; }

/* ─ Scrollable feed ─ */
.g-feed {
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #e4e4e7 transparent;
}
.g-feed::-webkit-scrollbar { width: 4px; }
.g-feed::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 999px; }

/* ─ Clamp helpers ─ */
.g-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.g-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }


.mp-opts { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.mp-opt { display:flex; align-items:center; gap:7px; border:1.5px solid #e4e4e7; border-radius:999px; padding:7px 14px; cursor:pointer; font-size:13px; font-weight:500; color:#52525b; background:#fff; transition:border-color .15s,background .15s; position:relative; overflow:hidden; font-family:inherit; }
.mp-opt:hover { border-color:#c4b5fd; background:#faf5ff; }
.mp-opt.sel { border-color:#7c3aed; background:#f5f3ff; color:#7c3aed; }
.mp-opt.done { cursor:default; }
.mp-opt-fill { position:absolute; left:0; top:0; bottom:0; background:rgba(124,58,237,.07); border-radius:999px; width:0; transition:width .8s ease .1s; z-index:0; }
.mp-opt > span { position:relative; z-index:1; }
.mp-opt-pct { font-size:12px; font-weight:700; color:#7c3aed; display:none; }
.mp-opt.done .mp-opt-pct { display:inline; }
.mp-chart { display:flex; align-items:flex-end; gap:4px; height:52px; }
.mp-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.mp-seg { width:100%; border-radius:2px 2px 0 0; }
.mp-day { font-size:9px; color:#a1a1aa; }


.g-widget-heading { font-size:28px; font-weight:700; letter-spacing:-.025em; color:#111; line-height:1.15; margin:0 0 3px; }
.g-widget-heading-sub { font-size:13px; color:#71717a; margin:0; }
</style>
<div class="g-wrap">
  <div class="g-header">
    <div><div class="g-widget-heading">Community Mood</div><div class="g-widget-sub">How is everyone feeling this week?</div></div>
    <span class="g-subtle">Resets Monday · 847 responses</span>
  </div>
  <div style="display:grid;grid-template-columns:1fr 220px;gap:20px;align-items:start">
    <div>
      <div class="mp-opts" id="mpOpts">
        <button class="mp-opt" data-val="60"><div class="mp-opt-fill"></div><span>🚀</span><span>Crushing it</span><span class="mp-opt-pct">60%</span></button>
        <button class="mp-opt" data-val="22"><div class="mp-opt-fill"></div><span>😊</span><span>Solid week</span><span class="mp-opt-pct">22%</span></button>
        <button class="mp-opt" data-val="12"><div class="mp-opt-fill"></div><span>😐</span><span>Mixed</span><span class="mp-opt-pct">12%</span></button>
        <button class="mp-opt" data-val="6"><div class="mp-opt-fill"></div><span>😓</span><span>Tough week</span><span class="mp-opt-pct">6%</span></button>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="g-btn-primary" id="mpBtn" disabled data-action="submit">Vote</button>
        <span class="g-subtle" id="mpCount">Select how you're feeling</span>
      </div>
    </div>
    <div>
      <div class="g-widget-label" style="margin-bottom:8px">7-day trend</div>
      <div class="mp-chart">
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:26px"></div><div class="mp-seg" style="background:#0ea5e9;height:12px"></div><div class="mp-seg" style="background:#f59e0b;height:7px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">M</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:28px"></div><div class="mp-seg" style="background:#0ea5e9;height:12px"></div><div class="mp-seg" style="background:#f59e0b;height:6px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">T</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:25px"></div><div class="mp-seg" style="background:#0ea5e9;height:13px"></div><div class="mp-seg" style="background:#f59e0b;height:6px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">W</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:29px"></div><div class="mp-seg" style="background:#0ea5e9;height:11px"></div><div class="mp-seg" style="background:#f59e0b;height:6px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">T</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:30px"></div><div class="mp-seg" style="background:#0ea5e9;height:10px"></div><div class="mp-seg" style="background:#f59e0b;height:5px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">F</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:27px"></div><div class="mp-seg" style="background:#0ea5e9;height:13px"></div><div class="mp-seg" style="background:#f59e0b;height:5px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">S</div></div>
        <div class="mp-col"><div class="mp-seg" style="background:#7c3aed;height:29px"></div><div class="mp-seg" style="background:#0ea5e9;height:11px"></div><div class="mp-seg" style="background:#f59e0b;height:6px"></div><div class="mp-seg" style="background:#e4e4e7;height:3px"></div><div class="mp-day">S</div></div>
      </div>
      <div style="margin-top:10px;padding:10px 12px;background:#f9f9fb;border-radius:8px;display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">🚀</span>
        <div><div class="g-body-s" style="font-weight:600">High energy</div><div class="g-subtle">60% crushing it this week</div></div>
      </div>

</section>
<script>
(function(){var R=document.getElementById('w-moodpoll');if(!R)R=document;

var sel=null;
R.querySelectorAll('.mp-opt').forEach(function(opt){
  opt.addEventListener('click',function(){
    if(R.querySelector('.mp-opt.done'))return;
    R.querySelectorAll('.mp-opt').forEach(function(o){o.classList.remove('sel');});
    opt.classList.add('sel'); sel=opt;
    R.querySelector('#mpBtn').disabled=false;
    R.querySelector('#mpCount').textContent='Ready to submit';
  });
});
R.querySelector('[data-action="submit"]').addEventListener('click',function(){
  if(!sel)return;
  R.querySelectorAll('.mp-opt').forEach(function(o){
    o.classList.add('done'); o.classList.remove('sel');
    o.querySelector('.mp-opt-fill').style.width=o.getAttribute('data-val')+'%';
  });
  sel.classList.add('sel');
  R.querySelector('#mpBtn').textContent='✓ Voted!'; R.querySelector('#mpBtn').disabled=true;
  R.querySelector('#mpCount').textContent='848 responses this week';
});

})();
</script>
