<section id="w-hero">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.hw {
  position: relative;
  width: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(135deg, #4c1d95 0%, #5b21b6 20%, #6d28d9 45%, #4338ca 70%, #312e81 100%);
  background-size: 300% 300%;
  animation: hwGrad 10s ease infinite;
}
@keyframes hwGrad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.hw-inner {
  position: relative;
  z-index: 2;
  max-width: 1140px;
  margin: 0 auto;
  padding: 52px 40px 56px;
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 40px;
  align-items: center;
}

.hw-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.hw-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 48px 48px;
}
.hw-orb { position:absolute;border-radius:50%;filter:blur(60px);opacity:.25;pointer-events:none; }
.hw-orb-1 { width:500px;height:500px;background:radial-gradient(#a78bfa,#7c3aed);top:-150px;right:-100px;animation:orb1 14s ease-in-out infinite; }
.hw-orb-2 { width:300px;height:300px;background:radial-gradient(#60a5fa,#2563eb);bottom:-80px;left:25%;animation:orb2 11s ease-in-out infinite; }
.hw-orb-3 { width:200px;height:200px;background:radial-gradient(#f472b6,#db2777);top:40px;left:42%;animation:orb3 9s ease-in-out infinite;opacity:.15; }
@keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,30px) scale(1.1)} }
@keyframes orb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px) scale(1.12)} }
@keyframes orb3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,15px)} }

.hw-particles { position:absolute;inset:0;pointer-events:none;overflow:hidden; }
.hw-p { position:absolute;border-radius:50%;background:rgba(255,255,255,.35);animation:pRise linear infinite; }
@keyframes pRise { 0%{transform:translateY(0) translateX(0);opacity:0} 10%{opacity:.6} 90%{opacity:.3} 100%{transform:translateY(-200px) translateX(var(--dx,15px));opacity:0} }

.hw-eyebrow { display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px; }
.hw-dot { width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:eDot 2s ease-in-out infinite; }
@keyframes eDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
.hw-name { font-size:clamp(1.6rem,2.5vw,2.25rem);font-weight:800;letter-spacing:-.035em;color:#fff;line-height:1.1;margin-bottom:10px; }
.hw-sub { font-size:14px;color:rgba(255,255,255,.6);margin-bottom:28px;line-height:1.6; }

.hw-stats { display:flex;align-items:center;margin-bottom:28px; }
.hw-stat-n { display:block;font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1; }
.hw-stat-l { display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:3px; }
.hw-divider { width:1px;height:36px;background:rgba(255,255,255,.15);margin:0 20px; }

.hw-actions { display:flex;gap:10px; }
.hw-btn-w { background:#fff;color:#5b21b6;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s,box-shadow .15s; }
.hw-btn-w:hover { transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2); }
.hw-btn-g { background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .15s; }
.hw-btn-g:hover { background:rgba(255,255,255,.18);transform:translateY(-1px); }

.hw-card { background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:22px 24px;backdrop-filter:blur(12px); }
.hw-card-label { font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px; }
.hw-card-title { font-size:15px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px; }
.hw-card-sub { font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.5; }
.hw-prog-track { height:5px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-bottom:8px; }
.hw-prog-fill { height:100%;background:linear-gradient(90deg,#a78bfa,#60a5fa);border-radius:999px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1); }
.hw-prog-lbl { font-size:11px;color:rgba(255,255,255,.45);margin-bottom:12px; }
.hw-xp { display:inline-flex;align-items:center;gap:4px;background:rgba(167,139,250,.25);border:1px solid rgba(167,139,250,.3);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:700;color:#ddd6fe; }
</style>

<div class="hw">
  <div class="hw-bg">
    <div class="hw-grid"></div>
    <div class="hw-orb hw-orb-1"></div>
    <div class="hw-orb hw-orb-2"></div>
    <div class="hw-orb hw-orb-3"></div>
    <div class="hw-particles" id="hwP"></div>
  </div>
  <div class="hw-inner">
    <div>
      <div class="hw-eyebrow"><div class="hw-dot"></div>Welcome back</div>
      <div class="hw-name">Welcome back,<br>Sergi Martinez</div>
      <div class="hw-sub">Continue where you left off — the community is active right now.</div>
      <div class="hw-stats">
        <div class="hw-stat"><span class="hw-stat-n" id="hwXp">0</span><span class="hw-stat-l">XP Points</span></div>
        <div class="hw-divider"></div>
        <div class="hw-stat"><span class="hw-stat-n" id="hwC">0</span><span class="hw-stat-l">Contributions</span></div>
        <div class="hw-divider"></div>
        <div class="hw-stat"><span class="hw-stat-n">Top 5%</span><span class="hw-stat-l">This month</span></div>
      </div>
      <div class="hw-actions">
        <button class="hw-btn-w">+ New Topic</button>
        <button class="hw-btn-g">My Profile →</button>
      </div>
    </div>
    <div class="hw-card">
      <div class="hw-card-label">🎯 Weekly Challenge</div>
      <div class="hw-card-title">Answer 3 unanswered questions</div>
      <div class="hw-card-sub">Help your community — earn XP and reputation.</div>
      <div class="hw-prog-track"><div class="hw-prog-fill" id="hwBar"></div></div>
      <div class="hw-prog-lbl">1 of 3 complete</div>
      <div class="hw-xp">⚡ +150 XP on completion</div>
    </div>
  </div>
</div>
</section>

<script>
(function(){
  var R=document.currentScript?document.currentScript.getRootNode():document;
  if(!R||R.nodeType!==11){R=document.querySelector('#w-hero')||document;}
  function init(){
    var bar=R.getElementById('hwBar');
    if(bar) setTimeout(function(){ bar.style.width='33%'; },300);
    function cu(id,t,d){
      var el=R.getElementById(id); if(!el) return;
      setTimeout(function(){
        var s=Date.now();
        (function tick(){
          var p=Math.min((Date.now()-s)/1200,1);
          var v=Math.round((1-Math.pow(1-p,3))*t);
          el.textContent=v>=1000?(v/1000).toFixed(1).replace(/\.0$/,'')+'k':v;
          if(p<1) requestAnimationFrame(tick);
        })();
      },d);
    }
    cu('hwXp',2847,200); cu('hwC',47,350);
    var c=R.getElementById('hwP');
    if(c){ for(var i=0;i<16;i++){ (function(i){ setTimeout(function(){
      var p=document.createElement('div'); p.className='hw-p';
      var sz=1.5+Math.random()*2.5, dur=5+Math.random()*7, dx=(Math.random()-.5)*50;
      p.style.cssText='left:'+(5+Math.random()*90)+'%;bottom:'+(Math.random()*30)+'%;width:'+sz+'px;height:'+sz+'px;--dx:'+dx+'px;animation-duration:'+dur+'s;animation-delay:'+(Math.random()*8)+'s;opacity:'+(0.2+Math.random()*0.5);
      c.appendChild(p);
    },i*60); })(i); } }
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',init); } else { init(); }
})();
</script>
