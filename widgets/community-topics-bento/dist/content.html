<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .w {
    --accent: #5b50e8;
    --accent-soft: #eeecfb;
    --text-primary: #0f0f0f;
    --text-secondary: #555;
    --text-muted: #999;
    --border: #e8e8e8;
    --bg: #fff;
    --row-hover: #fafafa;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;

    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-primary);
    padding: 0 4px;
  }

  /* ── Header ── */
  .w-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 2px 0 14px;
    border-bottom: 1.5px solid var(--text-primary);
    margin-bottom: 0;
  }

  .w-title {
    font-family: var(--sans);
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .w-viewall {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0;
  }

  .w-viewall:hover { text-decoration: underline; }

  /* ── Row (each post) ── */
  .w-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 12px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    border-radius: 4px;
  }

  .w-row:hover { background: var(--row-hover); padding-left: 6px; padding-right: 6px; margin: 0 -6px; }
  .w-row:hover .w-post-title { color: var(--accent); }

  /* ── Post main content ── */
  .w-post-main { min-width: 0; }

  .w-post-meta-top {
    font-size: 0.6875rem;
    color: var(--text-muted);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .w-post-meta-top strong {
    color: var(--accent);
    font-weight: 600;
  }

  .w-post-title {
    font-family: var(--serif);
    font-size: 1.0625rem;
    font-weight: 400;
    line-height: 1.35;
    color: var(--text-primary);
    transition: color 0.15s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }

  /* First row gets larger serif title */
  .w-row:first-of-type .w-post-title {
    font-size: 1.25rem;
    -webkit-line-clamp: 2;
  }

  .w-post-desc {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .w-post-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .w-stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.6875rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .w-stat svg {
    width: 11px;
    height: 11px;
    opacity: 0.65;
    flex-shrink: 0;
  }

  .w-badge {
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid currentColor;
    white-space: nowrap;
  }

  .w-badge--article  { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .w-badge--discussion { color: #0a7a5f; border-color: #0a7a5f; background: #e8f5f1; }
  .w-badge--question { color: #b45309; border-color: #b45309; background: #fef3e2; }
  .w-badge--event    { color: #6d28d9; border-color: #6d28d9; background: #f5f0ff; }

  /* ── Right thumbnail (optional) ── */
  .w-post-thumb {
    width: 72px;
    height: 56px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--accent-soft);
    border: 1px solid var(--border);
  }

  .w-post-thumb-placeholder {
    width: 72px;
    height: 56px;
    border-radius: 4px;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-soft), #e0ddf8);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .w-post-thumb-placeholder svg {
    width: 20px;
    height: 20px;
    opacity: 0.3;
  }

  /* ── Loading / error ── */
  .w-loading, .w-empty {
    padding: 32px 0;
    text-align: center;
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  .w-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<div class="w">
  <div class="w-header">
    <span class="w-title">Community Topics</span>
    <a class="w-viewall" href="#" id="w-viewall-link">View all →</a>
  </div>

  <div id="w-feed">
    <div class="w-loading"><span class="w-spinner"></span>Loading posts…</div>
  </div>
</div>

<script>
(function () {

  /* ── Fallback sample data (shown if connector not configured) ── */
  var FALLBACK = [
    {
      title: "How we redesigned our onboarding flow and doubled activation rates in 60 days",
      description: "A deep dive into the research, experiments, and design decisions that led to a 2× improvement in user activation.",
      forum: "Product Strategy",
      type: "article",
      views: "3.2k", reactions: "148", replies: "34",
      url: "#"
    },
    {
      title: "Building a scalable QBR process for enterprise accounts without burning out your CS team",
      description: "Templates, automation strategies, and the exact setup we use to run QBRs at scale — covering 200+ accounts with a team of four.",
      forum: "Customer Success",
      type: "discussion",
      views: "1.8k", reactions: "92", replies: "57",
      url: "#"
    },
    {
      title: "Is PLG still the right motion for B2B SaaS in 2025?",
      description: "The landscape has shifted. What does product-led growth actually look like today, and when should you layer in sales?",
      forum: "Growth",
      type: "question",
      views: "940", reactions: "61", replies: "28",
      url: "#"
    },
    {
      title: "Our 2025 CS tech stack — what stayed, what got cut",
      description: "After a full audit of tooling costs and usage, here's what we kept and why.",
      forum: "Ops & Tooling",
      type: "article",
      views: "2.1k", reactions: "77", replies: "41",
      url: "#"
    },
    {
      title: "Pulse 2025 recap: the 5 themes that will define CS this year",
      description: "From AI-assisted workflows to the return of high-touch, here's what stood out across three days of sessions.",
      forum: "Community Announcements",
      type: "article",
      views: "4.7k", reactions: "203", replies: "89",
      url: "#"
    }
  ];

  /* ── Icon SVGs ── */
  var ICONS = {
    eye:     '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>',
    star:    '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2l1.5 3 3.5.5-2.5 2.4.6 3.5L8 10l-3.1 1.4.6-3.5L3 5.5 6.5 5z"/></svg>',
    comment: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 10a2 2 0 0 1-2 2H4l-3 3V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v6z"/></svg>'
  };

  function badgeClass(type) {
    var map = { article: 'w-badge--article', discussion: 'w-badge--discussion', question: 'w-badge--question', event: 'w-badge--event' };
    return map[type] || 'w-badge--article';
  }

  function formatNum(n) {
    if (!n && n !== 0) return '0';
    if (typeof n === 'string') return n;
    return n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(n);
  }

  function renderRow(post, isFirst) {
    var typeLabel = post.type ? post.type.charAt(0).toUpperCase() + post.type.slice(1) : 'Article';
    var bClass = badgeClass((post.type || 'article').toLowerCase());

    var thumb = '';
    if (post.imageUrl) {
      thumb = '<img class="w-post-thumb" src="' + post.imageUrl + '" alt="" onerror="this.style.display=\'none\'">';
    }

    var desc = post.description
      ? '<div class="w-post-desc">' + esc(post.description) + '</div>'
      : '';

    var href = post.url && post.url !== '#' ? post.url : (post.seoCommunityUrl || '#');

    return '<a class="w-row" href="' + esc(href) + '" target="_blank" rel="noopener">'
      + '<div class="w-post-main">'
      +   '<div class="w-post-meta-top">Posted in <strong>' + esc(post.forum || post.category || '') + '</strong></div>'
      +   '<div class="w-post-title">' + esc(post.title || '') + '</div>'
      +   desc
      +   '<div class="w-post-footer">'
      +     '<span class="w-stat">' + ICONS.eye    + esc(formatNum(post.views))     + '</span>'
      +     '<span class="w-stat">' + ICONS.star   + esc(formatNum(post.reactions)) + '</span>'
      +     '<span class="w-stat">' + ICONS.comment + esc(formatNum(post.replies))  + '</span>'
      +     '<span class="w-badge ' + bClass + '">' + esc(typeLabel) + '</span>'
      +   '</div>'
      + '</div>'
      + thumb
      + '</a>';
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFeed(posts) {
    var feed = document.getElementById('w-feed');
    if (!posts || !posts.length) {
      feed.innerHTML = '<div class="w-empty">No posts found.</div>';
      return;
    }
    feed.innerHTML = posts.map(function (p, i) { return renderRow(p, i === 0); }).join('');
  }

  /* ── Map raw Gainsight Community API response → our post shape ── */
  function mapApiPosts(data) {
    var items = [];
    // Handle array or {items:[...]} or {topics:[...]} shapes
    if (Array.isArray(data)) items = data;
    else if (data && Array.isArray(data.items)) items = data.items;
    else if (data && Array.isArray(data.topics)) items = data.topics;
    else if (data && Array.isArray(data.results)) items = data.results;

    return items.map(function (p) {
      return {
        title:       p.title || p.name || '',
        description: p.description || p.excerpt || p.body_excerpt || '',
        forum:       (p.forum && p.forum.name) || p.category || p.forumName || '',
        type:        (p.contentType || p.type || 'article').toLowerCase(),
        views:       p.viewsCount || p.views || 0,
        reactions:   p.likesCount || p.reactions || p.likes || 0,
        replies:     p.answersCount || p.commentsCount || p.replies || 0,
        url:         p.seoCommunityUrl || p.url || p.link || '#',
        imageUrl:    p.imageUrl || p.thumbnailUrl || ''
      };
    });
  }

  /* ── Try connector, fall back to sample data ── */
  var CONNECTOR_URL = '/widget-service/connectors/community-topics/execute';

  fetch(CONNECTOR_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
    .then(function (r) {
      if (!r.ok) throw new Error('connector-unavailable');
      return r.json();
    })
    .then(function (data) {
      var posts = mapApiPosts(data);
      renderFeed(posts.length ? posts : FALLBACK);
    })
    .catch(function () {
      // Connector not set up yet — show sample data
      renderFeed(FALLBACK);
    });

})();
</script>
