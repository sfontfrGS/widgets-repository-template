<section id="w-hero-cinematic">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

#w-hero-cinematic, #w-hero-cinematic * { box-sizing: border-box; margin: 0; padding: 0; }

.hc-root {
  position: relative;
  width: 100%;
  min-height: 620px;
  overflow: hidden;
  background: #ffffff;
  font-family: 'Inter', system-ui, sans-serif;
}

/* ── Video: covers full widget ── */
.hc-video-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.hc-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 0.05s linear;
}

/* Three-layer gradient: white top → clear middle → white bottom */
.hc-video-gradient {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(255,255,255,1)   0%,
      rgba(255,255,255,0.5) 25%,
      rgba(255,255,255,0)   45%,
      rgba(255,255,255,0)   55%,
      rgba(255,255,255,0.6) 80%,
      rgba(255,255,255,1)   100%
    );
  pointer-events: none;
}

/* ── Nav ── */
.hc-nav {
  position: relative;
  z-index: 10;
  width: 100%;
}
.hc-nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.75rem 3rem;
}
.hc-logo {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 1.75rem;
  letter-spacing: -0.02em;
  color: #000000;
  user-select: none;
  line-height: 1;
}
.hc-logo sup { font-size: 0.52em; vertical-align: super; }
.hc-nav-links {
  display: flex;
  align-items: center;
  gap: 2.5rem;
  list-style: none;
}
.hc-nav-links a {
  font-size: 0.875rem;
  text-decoration: none;
  font-family: 'Inter', system-ui, sans-serif;
  transition: opacity 0.2s;
}
.hc-nav-links a:hover { opacity: 0.55; }
.hc-nav-cta {
  padding: 0.6rem 1.4rem;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 999px;
  font-size: 0.875rem;
  font-family: 'Inter', system-ui, sans-serif;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: transform 0.2s, opacity 0.2s;
}
.hc-nav-cta:hover { transform: scale(1.03); }

/* ── Hero ── */
.hc-hero {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;

.hc-headline {

.hc-desc {

.hc-cta {

  color: #fff;
  border: none;
  border-radius: 999px;

  font-family: 'Inter', system-ui, sans-serif;
  cursor: pointer;
  letter-spacing: -0.01em;

}
.hc-cta:hover { transform: scale(1.03); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

/* ── Animations ── */
@keyframes hcFadeRise {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hc-a1 { animation: hcFadeRise 0.9s ease-out 0.1s both; }
.hc-a2 { animation: hcFadeRise 0.9s ease-out 0.3s both; }
.hc-a3 { animation: hcFadeRise 0.9s ease-out 0.5s both; }

  <!-- Video background — covers full widget -->
  <div class="hc-video-wrap">

      id="hcVideo"
      class="hc-video"

      muted

  <!-- Hero content -->

<script>
(function() {
  function init() {
    var video = document.getElementById('hcVideo');
    if (!video) return;

    var FADE = 0.5;
    var dead = false;
    var rafId;

    // Fade loop via rAF
    function tick() {
      if (!dead && video.duration && !isNaN(video.duration) && video.duration > 0) {
        var t = video.currentTime;
        var d = video.duration;
        var op;
        if (t < FADE) {
          op = t / FADE;
        } else if (d - t < FADE) {
          op = (d - t) / FADE;
        } else {
          op = 1;
        }
        video.style.opacity = String(Math.max(0, Math.min(1, op)));
      }
      if (!dead) rafId = requestAnimationFrame(tick);
    }

    // On end: fade out, pause, reset, play again
    video.addEventListener('ended', function() {
      video.style.opacity = '0';
      setTimeout(function() {
        if (dead) return;
        video.currentTime = 0;
        video.play().catch(function() {});
      }, 120);
    });

    // Start
    video.style.opacity = '0';
    var p = video.play();
    if (p && p.catch) {
      p.catch(function() {
        // Autoplay blocked — try on first interaction
        document.addEventListener('click', function onClick() {
          video.play().catch(function(){});
          document.removeEventListener('click', onClick);
        });
        document.addEventListener('touchstart', function onTouch() {
          video.play().catch(function(){});
          document.removeEventListener('touchstart', onTouch);
        });
      });
    }
    rafId = requestAnimationFrame(tick);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
