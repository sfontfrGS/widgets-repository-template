<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

/* ── Reset ── */
#w-hero-cinematic, #w-hero-cinematic * { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Root container ── */
.hc-root {

/* ── Video layer ── */
.hc-video-wrap {

  top: 280px;
  left: 0; right: 0; bottom: 0;
  z-index: 0;
  pointer-events: none;
}
.hc-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.05s linear;
  opacity: 0;
}
.hc-video-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(

    #ffffff 0%,
    rgba(255,255,255,0.2) 40%,
    rgba(255,255,255,0.2) 60%,
    #ffffff 100%
  );
  pointer-events: none;
}

/* ── Nav ── */
.hc-nav {
  position: relative;
  z-index: 10;
  width: 100%;
}
.hc-nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 3rem;
  max-width: 90rem;
  margin: 0 auto;
}
.hc-logo {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 1.875rem;
  letter-spacing: -0.02em;
  color: #000000;
  user-select: none;

}
.hc-logo sup {

}
.hc-nav-links {
  display: flex;
  align-items: center;

}
.hc-nav-links a {
  font-size: 0.875rem;

  font-family: 'Inter', system-ui, sans-serif;
}
.hc-nav-links a:hover { opacity: 0.6; }
.hc-nav-cta {
  padding: 0.625rem 1.5rem;
  background: #000000;
  color: #ffffff;
  border: none;
  border-radius: 999px;
  font-size: 0.875rem;

  transition: transform 0.2s, opacity 0.2s;
  letter-spacing: -0.01em;
}
.hc-nav-cta:hover { transform: scale(1.03); }

/* ── Hero section ── */
.hc-hero {
  position: relative;
  z-index: 10;
  display: flex;

  align-items: center;

.hc-desc {

.hc-cta:hover {

/* ── Keyframe animations ── */
@keyframes hcFadeRise {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hc-a1 { animation: hcFadeRise 0.8s ease-out 0.0s both; }
.hc-a2 { animation: hcFadeRise 0.8s ease-out 0.2s both; }
.hc-a3 { animation: hcFadeRise 0.8s ease-out 0.4s both; }

<script>
(function() {
  var R = document;
  var FADE = 0.5;

  function init() {
    var video = R.getElementById('hcVideo');
    if (!video) return;

    var dead = false;
    var rafId;

    function tick() {
      if (!dead && video.duration && !isNaN(video.duration)) {
        var t = video.currentTime;
        var d = video.duration;
        var op;
        if (t < FADE) {
          op = t / FADE;
        } else if (t > d - FADE) {
          op = (d - t) / FADE;
        } else {
          op = 1;
        }
        video.style.opacity = String(Math.max(0, Math.min(1, op)));
      }
      rafId = requestAnimationFrame(tick);
    }

    video.addEventListener('ended', function() {
      video.style.opacity = '0';
      setTimeout(function() {
        if (dead) return;
        video.currentTime = 0;
        video.play().catch(function() {});
      }, 100);
    });

    video.style.opacity = '0';
    video.play().catch(function() {});
    rafId = requestAnimationFrame(tick);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
