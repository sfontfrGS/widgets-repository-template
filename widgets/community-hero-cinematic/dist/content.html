<section id="w-hero-cinematic">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

.hc {
  position: relative;
  width: 100%;
  min-height: 620px;
  overflow: hidden;
  background: #fafafa;
  font-family: 'Inter', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
}

/* ── Animated mesh background (replaces video — works everywhere) ── */
.hc-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(196,181,253,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 30%, rgba(147,197,253,.3) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 60% 80%, rgba(249,168,212,.2) 0%, transparent 55%),
    linear-gradient(160deg, #fefeff 0%, #f5f3ff 30%, #eff6ff 60%, #fdf4ff 100%);
  animation: meshShift 12s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(8deg) brightness(1.02); }
  100% { filter: hue-rotate(-5deg) brightness(.99); }
}

/* Animated orbs */
.hc-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 1;
}
.hc-orb-1 { width:600px;height:600px;background:rgba(167,139,250,.18);top:-200px;right:-150px;animation:hcO1 16s ease-in-out infinite; }
.hc-orb-2 { width:400px;height:400px;background:rgba(96,165,250,.15);bottom:-100px;left:10%;animation:hcO2 12s ease-in-out infinite; }
.hc-orb-3 { width:300px;height:300px;background:rgba(244,114,182,.12);top:20%;left:40%;animation:hcO3 10s ease-in-out infinite; }
@keyframes hcO1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-50px,40px) scale(1.08)} }
@keyframes hcO2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,-30px) scale(1.1)} }
@keyframes hcO3 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(-20px,20px) rotate(8deg)} }

/* Grain overlay */
.hc-grain {
  position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ── Nav ── */
.hc-nav {
  position: relative;
  z-index: 10;
  width: 100%;
}
.hc-nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.75rem 3rem;
  max-width: 90rem;
  margin: 0 auto;
}
.hc-logo {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 1.75rem;
  letter-spacing: -0.02em;
  color: #000;
  user-select: none;
  line-height: 1;
}
.hc-logo sup { font-size: .52em; vertical-align: super; }
.hc-nav-links { display:flex;align-items:center;gap:2.5rem;list-style:none; }
.hc-nav-links a { font-size:.875rem;text-decoration:none;font-family:'Inter',system-ui,sans-serif;transition:opacity .2s; }
.hc-nav-links a:hover { opacity:.55; }
.hc-nav-cta { padding:.6rem 1.4rem;background:#000;color:#fff;border:none;border-radius:999px;font-size:.875rem;font-family:'Inter',system-ui,sans-serif;cursor:pointer;letter-spacing:-.01em;transition:transform .2s,opacity .2s; }
.hc-nav-cta:hover { transform:scale(1.03); }

/* ── Hero ── */
.hc-hero {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 2rem 6rem;
}
.hc-headline {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 400;
  line-height: .95;
  letter-spacing: -.055em;
  color: #000;
  max-width: 80rem;
}
.hc-headline em { color: #6F6F6F; font-style: italic; }
.hc-desc {
  font-size: clamp(.9rem,1.4vw,1.05rem);
  color: #6F6F6F;
  max-width: 36rem;
  margin-top: 1.75rem;
  line-height: 1.75;
  font-family: 'Inter',system-ui,sans-serif;
}
.hc-cta {
  margin-top: 2.5rem;
  padding: 1rem 3.5rem;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  font-family: 'Inter',system-ui,sans-serif;
  cursor: pointer;
  letter-spacing: -.01em;
  transition: transform .2s, box-shadow .2s;
}
.hc-cta:hover { transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.15); }

/* ── Stagger animations ── */
@keyframes hcRise { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
.hc-a1 { animation:hcRise .9s ease-out .15s both; }
.hc-a2 { animation:hcRise .9s ease-out .35s both; }
.hc-a3 { animation:hcRise .9s ease-out .55s both; }
</style>

<div class="hc">
  <!-- Animated background -->
  <div class="hc-bg"></div>
  <div class="hc-orb hc-orb-1"></div>
  <div class="hc-orb hc-orb-2"></div>
  <div class="hc-orb hc-orb-3"></div>
  <div class="hc-grain"></div>

  <!-- Nav -->
  <nav class="hc-nav">
    <div class="hc-nav-inner">
      <span class="hc-logo">Aethera<sup>®</sup></span>
      <ul class="hc-nav-links">
        <li><a href="#" style="color:#000">Home</a></li>
        <li><a href="#" style="color:#6F6F6F">Studio</a></li>
        <li><a href="#" style="color:#6F6F6F">About</a></li>
        <li><a href="#" style="color:#6F6F6F">Journal</a></li>
        <li><a href="#" style="color:#6F6F6F">Reach Us</a></li>
      </ul>
      <button class="hc-nav-cta">Begin Journey</button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hc-hero">
    <h1 class="hc-headline hc-a1">
      Beyond <em>silence,</em> we build <em>the eternal.</em>
    </h1>
    <p class="hc-desc hc-a2">
      Building platforms for brilliant minds, fearless makers, and thoughtful souls.
      Through the noise, we craft digital havens for deep work and pure flows.
    </p>
    <button class="hc-cta hc-a3">Begin Journey</button>
  </section>
</div>
</section>
