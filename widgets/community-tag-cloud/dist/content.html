<section class="tc">
<style>
/* ─────────────────────────────────────────
   UNIFIED DESIGN SYSTEM
   Matches Community Topics Bento as reference
───────────────────────────────────────── */
.gs-root {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: #0a0a0a;
  background: #ffffff;
  -webkit-font-smoothing: antialiased;
  box-sizing: border-box;
}
.gs-root * { box-sizing: border-box; }

/* Wrapper */
.gs-wrap { max-width: 1140px; margin: 0 auto; padding: 24px 20px; }
.gs-wrap--sidebar { padding: 20px 16px; } /* no max-width — sidebar fills column */

/* ── Header (every widget) ── */
.gs-header { margin-bottom: 16px; }
.gs-header-row { display: flex; align-items: center; justify-content: space-between; }
.gs-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #a1a1aa;
}
.gs-heading {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: #0a0a0a;
  margin: 0 0 2px;
}
.gs-sub {
  font-size: 13px;
  color: #71717a;
  margin: 0;
}
.gs-link {
  font-size: 12px;
  font-weight: 500;
  color: #7c3aed;
  text-decoration: none;
  white-space: nowrap;
}
.gs-link:hover { text-decoration: underline; }

/* ── Tabs ── */
.gs-tabs {
  display: flex;
  gap: 2px;
  background: #f4f4f5;
  border-radius: 8px;
  padding: 3px;
}
.gs-tab {
  border: none;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: #71717a;
  font-family: inherit;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.gs-tab.active {
  background: #ffffff;
  color: #0a0a0a;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.gs-tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  border-radius: 999px;
  background: #7c3aed;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 0 4px;
}

/* ── Buttons ── */
.gs-btn-icon {
  width: 30px; height: 30px;
  border: 1px solid #e4e4e7;
  border-radius: 6px;
  background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: #3f3f46;
  transition: border-color .15s, background .15s, color .15s;
}
.gs-btn-icon:hover { border-color: #c4b5fd; background: #f5f3ff; color: #7c3aed; }
.gs-btn-icon:disabled { opacity: .3; cursor: default; pointer-events: none; }

.gs-btn-primary {
  display: inline-flex; align-items: center; gap: 5px;
  background: #7c3aed; color: #ffffff;
  border: none; border-radius: 6px;
  padding: 8px 16px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.gs-btn-primary:hover { background: #6d28d9; }

/* ── Dots (carousel) ── */
.gs-dots { display: flex; gap: 5px; align-items: center; }
.gs-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #e4e4e7;
  cursor: pointer;
  transition: background .2s, transform .2s;
}
.gs-dot.active { background: #7c3aed; transform: scale(1.3); }

/* ── Row / card hover ── */
.gs-hover:hover { background: #faf5ff; }

/* ── Stats ── */
.gs-stats { display: flex; align-items: center; gap: 10px; }
.gs-stat {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; color: #a1a1aa; white-space: nowrap;
}
.gs-stat svg { width: 11px; height: 11px; }

/* ── Like ── */
.gs-like {
  display: inline-flex; align-items: center; gap: 4px;
  border: none; background: transparent;
  font-size: 11px; font-weight: 500; color: #a1a1aa;
  font-family: inherit; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: color .15s, background .15s;
  user-select: none;
}
.gs-like svg { width: 12px; height: 12px; transition: fill .15s, stroke .15s; }
.gs-like:hover { color: #ef4444; background: #fef2f2; }
.gs-like:hover svg { stroke: #ef4444; }
.gs-like.on { color: #ef4444; }
.gs-like.on svg { fill: #ef4444; stroke: #ef4444; }

/* ── Badge ── */
.gs-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  white-space: nowrap;
}
.gs-badge--purple { background: #f5f3ff; color: #7c3aed; border: 1px solid #ede9fe; }
.gs-badge--green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.gs-badge--amber  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
.gs-badge--red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.gs-badge--muted  { background: #f4f4f5; color: #71717a; border: 1px solid #e4e4e7; }

/* ── Divider ── */
.gs-divider { height: 1px; background: #f4f4f5; margin: 0; }
.gs-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; margin-top: 10px;
  border-top: 1px solid #f4f4f5;
}

/* ── Progress ── */
.gs-progress-track { height: 5px; background: #e4e4e7; border-radius: 999px; overflow: hidden; }
.gs-progress-fill  { height: 100%; background: #7c3aed; border-radius: 999px; transition: width .8s ease; }

/* ── Input ── */
.gs-input {
  width: 100%; height: 40px;
  border: 1px solid #e4e4e7; border-radius: 8px;
  padding: 0 12px 0 36px;
  font-size: 13px; font-family: inherit;
  color: #0a0a0a; background: #ffffff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.gs-input::placeholder { color: #a1a1aa; }
.gs-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }

.tc { display:block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fff; padding:24px 20px; -webkit-font-smoothing:antialiased; }
.tc * { box-sizing:border-box; }
.tc-wrap { max-width:1140px; margin:0 auto; }

.tc-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
.tc-header h2 { font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#71717a; margin:0; }
.tc-period { font-size:11px; color:#a1a1aa; }

/* Compact horizontal row layout */
.tc-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }

/* Tag card — compact */
.tc-tag {
  border:1px solid #e4e4e7; border-radius:10px;
  padding:12px 14px;
  cursor:pointer; text-decoration:none; color:inherit;
  display:flex; flex-direction:column; gap:5px;
  transition:border-color .15s, background .15s, transform .15s;
  position:relative; overflow:hidden;
}
.tc-tag:hover { border-color:var(--c,#c4b5fd); background:#faf5ff; transform:translateY(-2px); box-shadow:0 4px 12px rgba(124,58,237,.07); }

/* Left accent */
.tc-tag::before { content:''; position:absolute; left:0; top:15%; bottom:15%; width:3px; background:var(--c,#7c3aed); border-radius:0 3px 3px 0; }

/* Featured card spans 2 cols */
.tc-tag--feat { grid-column:span 2; }

.tc-tag-name { font-size:11px; font-weight:700; color:#18181b; padding-left:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tc-tag-count { font-size:22px; font-weight:800; letter-spacing:-.03em; color:#0a0a0a; line-height:1; padding-left:8px; }
.tc-tag--feat .tc-tag-count { font-size:28px; }
.tc-tag-sub { font-size:10px; color:#71717a; padding-left:8px; }

/* Mini bar */
.tc-bar { height:3px; background:#f4f4f5; border-radius:999px; margin-top:2px; overflow:hidden; }
.tc-bar-fill { height:100%; border-radius:999px; background:var(--c,#7c3aed); width:0; transition:width .9s cubic-bezier(.4,0,.2,1) var(--d,.1s); }

/* Trend badge */
.tc-trend { font-size:10px; font-weight:600; padding-left:8px; }
.tc-trend.up { color:#16a34a; }
.tc-trend.dn { color:#dc2626; }
.tc-trend.hot { color:#f59e0b; }

/* ── Consistent widget header ── */
.gs-header { margin-bottom: 16px; }
.gs-header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 3px; }
.gs-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--gs-subtle, #a1a1aa); margin: 0; }
.gs-subtitle { font-size: 13px; color: var(--gs-muted, #71717a); margin: 0; }
.gs-link { font-size: 12px; font-weight: 500; color: var(--gs-accent, #7c3aed); text-decoration: none; }
.gs-link:hover { text-decoration: underline; }

</style>

<div class="tc-wrap">
  <div class="tc-header">
    <span class="gs-label">🔥 Trending Topics</span><span class="gs-label" style="color:#d4d4d8">This week</span>
  </div>

  <div class="tc-grid">
    <a class="tc-tag tc-tag--feat" href="#" style="--c:#7c3aed">
      <div class="tc-tag-name"># customer-success</div>
      <div class="tc-tag-count">284</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="100" style="--d:.05s"></div></div>
      <div class="tc-trend up">↑ 34% this week</div>
    </a>
    <a class="tc-tag" href="#" style="--c:#0ea5e9">
      <div class="tc-tag-name"># onboarding</div>
      <div class="tc-tag-count">161</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="57" style="--d:.1s"></div></div>
      <div class="tc-trend up">↑ 18%</div>
    </a>
    <a class="tc-tag" href="#" style="--c:#10b981">
      <div class="tc-tag-name"># ai-tools</div>
      <div class="tc-tag-count">119</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="42" style="--d:.15s"></div></div>
      <div class="tc-trend hot">🔥 +61%</div>
    </a>
    <a class="tc-tag" href="#" style="--c:#f59e0b">
      <div class="tc-tag-name"># product-feedback</div>
      <div class="tc-tag-count">138</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="49" style="--d:.2s"></div></div>
      <div class="tc-trend dn">↓ 5%</div>
    </a>
    <a class="tc-tag" href="#" style="--c:#8b5cf6">
      <div class="tc-tag-name"># qbr</div>
      <div class="tc-tag-count">97</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="34" style="--d:.25s"></div></div>
      <div class="tc-trend up">↑ 12%</div>
    </a>
    <a class="tc-tag" href="#" style="--c:#ec4899">
      <div class="tc-tag-name"># churn</div>
      <div class="tc-tag-count">84</div>
      <div class="tc-bar"><div class="tc-bar-fill" data-w="30" style="--d:.3s"></div></div>
      <div class="tc-trend dn">↓ 3%</div>
    </a>
  </div>
</div>
</section>

<script>
(function() {
  var ROOT = document.currentScript ? document.currentScript.closest('section') : document;
  if (!ROOT) ROOT = document;

(function(){
  function go(){ ROOT.querySelectorAll('.tc-bar-fill').forEach(function(el){ el.style.width=el.getAttribute('data-w')+'%'; }); }
  if('IntersectionObserver' in window){ var io=new IntersectionObserver(function(e){ if(e[0].isIntersecting){go();io.disconnect();} },{threshold:.2}); io.observe(ROOT.querySelector('.tc')); } else { setTimeout(go,200); }
}());
})();
</script>
