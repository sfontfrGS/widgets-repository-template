<section class="gs-root">
<style>
/* ─── Unified Design System ─── */
.gs-root { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; line-height:1.5; color:#0a0a0a; background:#fff; -webkit-font-smoothing:antialiased; }
.gs-root * { box-sizing:border-box; }
.gs-wrap { max-width:1140px; margin:0 auto; padding:24px 20px; }
.gs-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.gs-label { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#a1a1aa; }
.gs-stat { display:inline-flex; align-items:center; gap:3px; font-size:11px; color:#a1a1aa; }
.gs-stat svg { width:11px; height:11px; }
/* Pulse */
.cp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.cp-card { border:1px solid #e4e4e7; border-radius:10px; padding:20px 20px 16px; transition:border-color .15s,box-shadow .15s; }
.cp-card:hover { border-color:#c4b5fd; box-shadow:0 4px 16px rgba(124,58,237,.06); }
.cp-num { font-size:44px; font-weight:800; letter-spacing:-.04em; line-height:1; color:#0a0a0a; margin:8px 0 4px; }
.cp-sub { font-size:12px; color:#71717a; margin-bottom:10px; }
.cp-live { width:7px; height:7px; border-radius:50%; background:#22c55e; display:inline-block; animation:cpP 2s ease-in-out infinite; margin-right:5px; }
@keyframes cpP { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.65);} }
.cp-bars { display:flex; align-items:flex-end; gap:3px; height:28px; }
.cp-bar { flex:1; border-radius:2px 2px 0 0; background:#ede9fe; min-height:3px; }
.cp-bar.hi { background:#7c3aed; }
.cp-feed { display:flex; flex-direction:column; margin-top:8px; }
.cp-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #f4f4f5; text-decoration:none; color:inherit; transition:background .12s; border-radius:4px; }
.cp-row:last-child { border-bottom:none; }
.cp-row:hover { background:#faf5ff; padding-left:4px; padding-right:4px; margin:0 -4px; }
.cp-row-dot { width:5px; height:5px; border-radius:50%; background:#7c3aed; opacity:.4; flex-shrink:0; }
.cp-row-title { flex:1; font-size:12px; font-weight:500; color:#18181b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cp-row-time { font-size:11px; color:#a1a1aa; flex-shrink:0; }
</style>
<div class="gs-wrap">
  <div class="gs-header">
    <span class="gs-label">Community Pulse</span>
  </div>
  <div class="cp-grid">
    <div class="cp-card">
      <div class="gs-label"><span class="cp-live"></span>Active right now</div>
      <div class="cp-num" id="cpN1">847</div>
      <div class="cp-sub">members online in the last 15 min</div>
      <div class="cp-bars">
        <div class="cp-bar" style="height:35%"></div><div class="cp-bar" style="height:28%"></div><div class="cp-bar" style="height:45%"></div><div class="cp-bar" style="height:55%"></div><div class="cp-bar" style="height:65%"></div><div class="cp-bar" style="height:72%"></div><div class="cp-bar" style="height:80%"></div><div class="cp-bar" style="height:68%"></div><div class="cp-bar" style="height:75%"></div><div class="cp-bar" style="height:88%"></div><div class="cp-bar" style="height:94%"></div><div class="cp-bar hi" style="height:100%"></div>
      </div>
    </div>
    <div class="cp-card">
      <div class="gs-label">New posts today</div>
      <div class="cp-num" id="cpN2">63</div>
      <div class="cp-sub">topics started in the last 24h</div>
      <div class="cp-feed">
        <a class="cp-row" href="#"><span class="cp-row-dot"></span><span class="cp-row-title">How to reduce churn in your first 90 days</span><span class="cp-row-time">2m</span></a>
        <a class="cp-row" href="#"><span class="cp-row-dot"></span><span class="cp-row-title">Best QBR templates for enterprise accounts</span><span class="cp-row-time">18m</span></a>
        <a class="cp-row" href="#"><span class="cp-row-dot"></span><span class="cp-row-title">AI tools your CS team should be using now</span><span class="cp-row-time">41m</span></a>
      </div>
    </div>
  </div>
</div>
</section>
<script>
(function(){
  var ROOT=document.currentScript?document.currentScript.closest('section'):document; if(!ROOT)ROOT=document;
  function cu(id,t,ms){var el=ROOT.querySelector('#'+id);if(!el)return;var s=Date.now();(function r(){var p=Math.min((Date.now()-s)/ms,1),v=Math.round((1-Math.pow(2,-8*p))*t);el.textContent=v>=1000?(v/1000).toFixed(1).replace(/\.0$/,'')+'k':v;if(p<1)requestAnimationFrame(r);})();}
  cu('cpN1',847,900); cu('cpN2',63,700);
})();
</script>
