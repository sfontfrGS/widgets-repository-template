<section class="mm">
<style>
.mm { display:block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fff; padding:24px 20px; -webkit-font-smoothing:antialiased; }
.mm * { box-sizing:border-box; }
.mm-wrap { max-width:1140px; margin:0 auto; }
.mm-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
.mm-header h2 { font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#71717a; margin:0; }
.mm-header span { font-size:11px; color:#a1a1aa; }
.mm-body { display:grid; grid-template-columns:1fr 200px; gap:16px; align-items:start; }

/* svgMap container */
#mmMap { width:100%; border:1px solid #e4e4e7; border-radius:12px; overflow:hidden; background:#f9f9fb; }

/* override svgMap defaults to match our style */
#mmMap .svgMap-map-wrapper { background:#f9f9fb !important; }
#mmMap .svgMap-country { fill:#e4e4e7!important; stroke:#fff!important; stroke-width:.5!important; transition:fill .2s; }
#mmMap .svgMap-country:hover { fill:#ddd6fe!important; cursor:pointer; }
#mmMap .svgMap-active { fill:#7c3aed!important; }
#mmMap .svgMap-map-controls-wrapper { display:none!important; }
#mmMap .svgMap-tooltip { border-radius:8px!important; border:1px solid #e4e4e7!important; box-shadow:0 4px 16px rgba(0,0,0,.08)!important; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif!important; font-size:12px!important; }
#mmMap .svgMap-tooltip-title { font-weight:600!important; }

/* live dots overlay */
.mm-dots-layer { position:relative; pointer-events:none; }

/* right: top locations list */
.mm-list-title { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#a1a1aa; margin-bottom:10px; }
.mm-loc { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f4f4f5; }
.mm-loc:last-child { border-bottom:none; }
.mm-loc-rank { font-size:11px; color:#a1a1aa; font-weight:500; width:14px; flex-shrink:0; }
.mm-loc-flag { font-size:16px; line-height:1; flex-shrink:0; }
.mm-loc-info { flex:1; min-width:0; }
.mm-loc-name { font-size:12px; font-weight:600; color:#18181b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mm-loc-count { font-size:11px; color:#71717a; }
.mm-loc-bar { width:36px; height:4px; background:#f4f4f5; border-radius:999px; overflow:hidden; flex-shrink:0; }
.mm-loc-fill { height:100%; background:#7c3aed; border-radius:999px; width:0; transition:width .8s cubic-bezier(.4,0,.2,1); }

.mm-dot-pulse { animation: mmP 2s ease-in-out infinite; }
@keyframes mmP { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.65);} }
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/svgmap@2.19.2/dist/svg-map.min.css">

<div class="mm-wrap">
  <div class="mm-header">
    <h2>🌍 Member Map</h2>
    <span>2,341 members · 48 countries</span>
  </div>
  <div class="mm-body">
    <div id="mmMap"></div>
    <div>
      <div class="mm-list-title">Top locations</div>
      <div class="mm-loc"><span class="mm-loc-rank">1</span><span class="mm-loc-flag">🇺🇸</span><div class="mm-loc-info"><div class="mm-loc-name">United States</div><div class="mm-loc-count">312 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="100" style="width:100%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">2</span><span class="mm-loc-flag">🇬🇧</span><div class="mm-loc-info"><div class="mm-loc-name">United Kingdom</div><div class="mm-loc-count">241 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="77" style="width:77%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">3</span><span class="mm-loc-flag">🇩🇪</span><div class="mm-loc-info"><div class="mm-loc-name">Germany</div><div class="mm-loc-count">189 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="61" style="width:61%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">4</span><span class="mm-loc-flag">🇸🇬</span><div class="mm-loc-info"><div class="mm-loc-name">Singapore</div><div class="mm-loc-count">167 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="54" style="width:54%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">5</span><span class="mm-loc-flag">🇦🇺</span><div class="mm-loc-info"><div class="mm-loc-name">Australia</div><div class="mm-loc-count">134 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="43" style="width:43%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">6</span><span class="mm-loc-flag">🇧🇷</span><div class="mm-loc-info"><div class="mm-loc-name">Brazil</div><div class="mm-loc-count">98 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="31" style="width:31%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">7</span><span class="mm-loc-flag">🇫🇷</span><div class="mm-loc-info"><div class="mm-loc-name">France</div><div class="mm-loc-count">87 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="28" style="width:28%"></div></div></div>
      <div class="mm-loc"><span class="mm-loc-rank">8</span><span class="mm-loc-flag">🇨🇦</span><div class="mm-loc-info"><div class="mm-loc-name">Canada</div><div class="mm-loc-count">74 members</div></div><div class="mm-loc-bar"><div class="mm-loc-fill" data-w="24" style="width:24%"></div></div></div>
    </div>
  </div>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/svgmap@2.19.2/dist/svg-map.umd.min.js"></script>
<script>
(function(){
  var members = { US:312, GB:241, DE:189, SG:167, AU:134, BR:98, FR:87, CA:74, NL:61, IN:58, ES:47, SE:43, NO:38, JP:35, MX:29 };
  var max = 312;
  var values = {};
  Object.keys(members).forEach(function(k){ values[k] = { members: members[k] }; });

  new svgMap({
    targetElementID: 'mmMap',
    colorMax: '#7c3aed',
    colorMin: '#ede9fe',
    colorNoData: '#f4f4f5',
    flagType: 'emoji',
    data: {
      data: { members: { name: 'Members', format: '{0}', thousandSeparator: ',' } },
      applyData: 'members',
      values: values
    }
  });

  // Animate sidebar bars
  function go(){ document.querySelectorAll('.mm-loc-fill').forEach(function(el){ el.style.width = el.getAttribute('data-w') + '%'; }); }
  if('IntersectionObserver' in window){ var io=new IntersectionObserver(function(e){ if(e[0].isIntersecting){go();io.disconnect();} },{threshold:.1}); io.observe(document.querySelector('.mm')); } else { setTimeout(go,400); }

  // Fallback: if svgMap fails to load (CDN blocked), show a styled placeholder
  setTimeout(function(){
    var mapEl = document.getElementById('mmMap');
    if (mapEl && mapEl.children.length === 0) {
      mapEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:220px;flex-direction:column;gap:12px;">'
        + '<div style="font-size:48px">🌍</div>'
        + '<div style="font-size:13px;font-weight:600;color:#3f3f46">Global Community</div>'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:400px">'
        + ['🇺🇸 312','🇬🇧 241','🇩🇪 189','🇸🇬 167','🇦🇺 134','🇧🇷 98','🇫🇷 87','🇨🇦 74'].map(function(c){
            return '<span style="background:#f5f3ff;border:1px solid #ede9fe;border-radius:999px;padding:3px 10px;font-size:12px;color:#7c3aed;font-weight:500">'+c+'</span>';
          }).join('')
        + '</div>'
        + '<div style="font-size:11px;color:#a1a1aa">2,341 members across 48 countries</div>'
        + '</div>';
    }
  }, 2000);
}());
</script>
